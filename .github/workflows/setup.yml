name: CI
on:
  push:
    branches: [main]
jobs:
  build:
    name: "NodeJS"
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: https://www.apio.systems
    steps:
    - uses: actions/checkout@v5
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
    - run: which pnpm || ( sudo apt install npm && sudo npm install -g pnpm@latest-10 && pnpm install )
    - run: pnpm install --frozen-lockfile
    - run: pnpm --filter @apio/shared build
    - run: pnpm --filter @apio/api build
    - run: pnpm --filter @apio/web build
  deploy:
    name: "Deploy to staging"
    runs-on: ubuntu-latest
    environment: work
    needs: build
    env:
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_KEY: ${{ secrets.SSH_KEY }}
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_KEY" > ~/.ssh/staging.key
          chmod 600 ~/.ssh/staging.key
          ssh-keyscan -p $SSH_PORT $SSH_HOST >> ~/.ssh/known_hosts
          cat >>~/.ssh/config <<END
          Host staging
              HostName $SSH_HOST
              User $SSH_USER
              Port $SSH_PORT
              IdentityFile ~/.ssh/staging.key
              StrictHostKeyChecking no
          END
      - name: Check SSH Configure
        run: cat ~/.ssh/config
      - name: Send build to server
        run: rsync -rvz -e "ssh -p $SSH_PORT -i $SSH_KEY" apps/web/.next/static/ $SSH_USER@$SSH_HOST:/var/www/html/site --delete
      - name: Send public to server
        run: rsync -rvz -e "ssh -p $SSH_PORT -i $SSH_KEY" apps/web/public/ $SSH_USER@$SSH_HOST:/var/www/html/site --delete
      - name: Check out the source
        run: which cat || ssh staging 'cd workflow && git fetch && git reset --hard origin/main'
      - name: Services restart
        run: which cat || ssh staging 'sudo systemctl restart apio-api apio-web'
