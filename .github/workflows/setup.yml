name: CI
on:
  push:
    branches: [main]
jobs:
  build:
    name: "NodeJS"
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: https://www.apio.systems
    steps:
    - uses: actions/checkout@v5
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
    - run: which pnpm || ( apt install pnpm )
    - run: pnpm install --frozen-lockfile
    - run: pnpm --filter @apio/shared build
    - run: pnpm --filter @apio/api build
    - run: cd apps/api && npx prisma db push && cd ../..
    - run: pnpm --filter @apio/web build
    - run: cp -r apps/web/.next/static apps/web/.next/standalone/apps/web/.next/static
    - run: cp -r apps/web/public apps/web/.next/standalone/apps/web/public
  deploy:
    name: "Deploy to staging"
    runs-on: ubuntu-latest
    environment: work
    needs: build
    env:
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_KEY: ${{ secrets.SSH_KEY }}
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_KEY" > ~/.ssh/staging.key
          chmod 600 ~/.ssh/staging.key
          ssh-keyscan -p $SSH_PORT $SSH_HOST >> ~/.ssh/known_hosts
          cat >>~/.ssh/config <<END
          Host staging
              HostName $SSH_HOST
              User $SSH_USER
              Port $SSH_PORT
              IdentityFile ~/.ssh/staging.key
              StrictHostKeyChecking no
          END
      - name: Check SSH Configure
        run: cat ~/.ssh/config
      - name: Stop the server
        run: ssh staging 'echo Stop'
      - name: Check out the source
        run: ssh staging 'cd workflow && git fetch && git reset --hard origin/main'
      - name: Start the backend
        if: ${{ always() }}
        run: ssh staging 'cd ~/workflow/apps/api && node --env-file=.env dist/index.js'
      - name: Start the frontend
        if: ${{ always() }}
        env:
          API_URL: http://localhost:4000
          SITE_URL: https://www.apio.systems
          HOSTNAME: 0.0.0.0
          PORT: 3000
          DISALLOW_ROBOTS: false
        run: ssh staging 'cd ~/workflow/apps/web/.next/standalone && node apps/web/server.js'
